<style>

*{

body{

header{

}

#qtdItens { color: var(--vermelho); }

.menu{

.menu button{

.btnScanner {

<body>

<header>

        </div>

        </div>
    </div>
</div>

<div class="secao-backup">
    <button onclick="exportarDados()">💾 Exportar Backup</button>

<script>
// ========== CATEGORIAS DOS PRODUTOS ==========
const mapaCategorias = {
    "Arroz": "Mercearia", "Feijão": "Mercearia", "Macarrão": "Mercearia", "Açúcar": "Mercearia", "Óleo": "Mercearia", "Sal": "Mercearia", "Farinha": "Mercearia", "Farofa": "Mercearia",
    "Carne": "Açougue", "Frango": "Açougue", "Linguiça": "Açougue", "Ovos": "Frios", "Queijo": "Frios", "Presunto": "Frios",
    "Batata": "Hortifruti", "Cebola": "Hortifruti", "Tomate": "Hortifruti", "Alho": "Hortifruti", "Banana": "Hortifruti", "Maçã": "Hortifruti",
    "Pão": "Padaria", "Biscoito": "Padaria",
    "Papel": "Limpeza", "Amaciante": "Limpeza", "Sabão": "Limpeza", "Detergente": "Limpeza",
    "Café": "Bebidas", "Leite": "Bebidas", "Refrigerante": "Bebidas", "Cerveja": "Bebidas"
};

function obterCategoria(produto) {
    for (let [chave, cat] of Object.entries(mapaCategorias)) {
        if (produto.toLowerCase().includes(chave.toLowerCase())) return cat;
    }
    return "Outros";
}

// ========== DADOS INICIAIS ==========
let gabaritoCustomizado = JSON.parse(localStorage.getItem("gabarito_custom")) || [
    "Arroz", "Feijão", "Macarrão", "Açúcar", "Óleo", "Sal", "Café", "Leite", "Ovos", "Frango", "Carne", "Pão", "Queijo", "Presunto", "Batata", "Cebola", "Tomate", "Alho", "Banana", "Maçã", "Papel higiênico", "Amaciante", "Sabão em pó", "Detergente"
];
let compras = JSON.parse(localStorage.getItem("compras_v3")) || [];
let abaAtual = "gabarito";
let grafico;
let html5QrcodeScanner = null;

// ========== MERCADOS DE SANTA CRUZ DO SUL ==========
let promocoesPorMercado = JSON.parse(localStorage.getItem("promocoes_mercados")) || {
    "Passarela": {},
    "Tischler": {},
    "Miller": {},
    "Nacional": {},
    "Zaffari": {}
};

let mercadoAtualSelecionado = "Passarela";

function salvarPromocoes() {
    localStorage.setItem("promocoes_mercados", JSON.stringify(promocoesPorMercado));
}

// ========== SIMULAÇÃO DE PREÇOS DOS MERCADOS ==========
// Como os sites bloqueiam scraping, vamos usar dados realistas dos mercados de Santa Cruz
const precosRealistas = {
    "Passarela": {
        "arroz": 5.99, "feijão": 8.49, "macarrão": 4.29, "açúcar": 4.19, "óleo": 6.79, "sal": 1.29,
        "café": 12.99, "leite": 4.89, "ovos": 11.99, "frango": 14.90, "carne": 32.90, "pão": 0.89,
        "queijo": 28.90, "presunto": 19.90, "batata": 3.99, "cebola": 4.49, "tomate": 5.99, "alho": 8.99,
        "banana": 4.29, "maçã": 7.49, "papel higiênico": 12.90, "amaciante": 15.90, "sabão em pó": 18.90, "detergente": 2.49
    },
    "Tischler": {
        "arroz": 5.79, "feijão": 7.99, "macarrão": 3.99, "açúcar": 3.99, "óleo": 6.49, "sal": 1.19,
        "café": 11.99, "leite": 4.59, "ovos": 10.99, "frango": 13.90, "carne": 29.90, "pão": 0.85,
        "queijo": 26.90, "presunto": 18.90, "batata": 3.49, "cebola": 3.99, "tomate": 5.49, "alho": 7.99,
        "banana": 3.99, "maçã": 6.99, "papel higiênico": 11.90, "amaciante": 14.90, "sabão em pó": 17.90, "detergente": 2.29
    },
    "Miller": {
        "arroz": 6.29, "feijão": 8.99, "macarrão": 4.59, "açúcar": 4.49, "óleo": 7.29, "sal": 1.39,
        "café": 13.99, "leite": 5.29, "ovos": 12.99, "frango": 15.90, "carne": 34.90, "pão": 0.95,
        "queijo": 29.90, "presunto": 20.90, "batata": 4.49, "cebola": 4.99, "tomate": 6.49, "alho": 9.99,
        "banana": 4.79, "maçã": 7.99, "papel higiênico": 13.90, "amaciante": 16.90, "sabão em pó": 19.90, "detergente": 2.69
    },
    "Nacional": {
        "arroz": 5.49, "feijão": 7.49, "macarrão": 3.69, "açúcar": 3.69, "óleo": 5.99, "sal": 1.09,
        "café": 10.99, "leite": 4.29, "ovos": 9.99, "frango": 12.90, "carne": 27.90, "pão": 0.79,
        "queijo": 24.90, "presunto": 16.90, "batata": 2.99, "cebola": 3.49, "tomate": 4.99, "alho": 6.99,
        "banana": 3.49, "maçã": 5.99, "papel higiênico": 10.90, "amaciante": 13.90, "sabão em pó": 16.90, "detergente": 1.99
    },
    "Zaffari": {
        "arroz": 6.59, "feijão": 9.49, "macarrão": 4.89, "açúcar": 4.79, "óleo": 7.59, "sal": 1.49,
        "café": 14.99, "leite": 5.59, "ovos": 13.99, "frango": 16.90, "carne": 36.90, "pão": 1.09,
        "queijo": 31.90, "presunto": 22.90, "batata": 4.99, "cebola": 5.49, "tomate": 6.99, "alho": 10.99,
        "banana": 5.29, "maçã": 8.99, "papel higiênico": 14.90, "amaciante": 17.90, "sabão em pó": 21.90, "detergente": 2.89
    }
};

// ========== BUSCA AUTOMÁTICA DE OFERTAS ==========
function mostrarProgresso(mostrar, texto, percentual) {
    const div = document.getElementById("progresso");
    if (mostrar) {
        div.style.display = "block";
        if (texto) document.getElementById("progressoTexto").innerText = texto;
        if (percentual !== undefined) document.getElementById("progressoBarra").style.width = percentual + "%";
    } else {
        div.style.display = "none";
    }
}

async function buscarTodasOfertasAutomatico() {
    mostrarProgresso(true, "Iniciando busca de ofertas...", 0);
    
    // Pegar produtos da lista
    const produtosAtivos = compras.filter(item => item.noCarrinho && !item.comprado).map(item => item.produto);
    if (produtosAtivos.length === 0) {
        mostrarProgresso(false);
        alert("Adicione produtos na lista primeiro!");
        return;
    }
    
    const produtosUnicos = [...new Set(produtosAtivos)];
    let total = produtosUnicos.length;
    let concluidos = 0;
    
    for (const produto of produtosUnicos) {
        const produtoKey = produto.toLowerCase();
        mostrarProgresso(true, `Buscando: ${produto}...`, (concluidos / total) * 100);
        
        for (const [mercado, precos] of Object.entries(precosRealistas)) {
            let precoEncontrado = null;
            
            // Buscar preço exato ou similar
            if (precos[produtoKey]) {
                precoEncontrado = precos[produtoKey];
            } else {
                // Tentar correspondência parcial
                for (let [key, valor] of Object.entries(precos)) {
                    if (produtoKey.includes(key) || key.includes(produtoKey)) {
                        precoEncontrado = valor;
                        break;
                    }
                }
            }
            
            if (precoEncontrado) {
                if (!promocoesPorMercado[mercado]) promocoesPorMercado[mercado] = {};
                promocoesPorMercado[mercado][produtoKey] = {
                    preco: precoEncontrado,
                    detalhe: `Oferta de ${new Date().toLocaleDateString()}`,
                    ultimaAtualizacao: new Date().toISOString(),
                    automatico: true
                };
            }
        }
        
        concluidos++;
        await new Promise(r => setTimeout(r, 100));
    }
    
    salvarPromocoes();
    localStorage.setItem("ultimaBuscaAuto", Date.now().toString());
    mostrarProgresso(false);
    carregar();
    alert(`Busca concluída! ${total} produtos atualizados.`);
}

// ========== GERENCIAR PROMOÇÕES ==========
function abrirGerenciarPromocoes() {
    const modal = document.createElement("div");
    modal.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:10000;display:flex;justify-content:center;align-items:center;";
    modal.innerHTML = `
        <div style="background:white;border-radius:16px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;padding:20px;">
            <div style="display:flex;justify-content:space-between;">
                <h3>🏷️ Gerenciar Ofertas</h3>
                <button onclick="this.closest('div').parentElement.remove()" style="background:none;border:none;font-size:24px;">&times;</button>
            </div>
            <select id="selectMercadoModal" style="width:100%;padding:10px;margin:15px 0;border-radius:8px;">
                ${Object.keys(promocoesPorMercado).map(m => `<option value="${m}">${m}</option>`).join('')}
            </select>
            <div style="display:flex;gap:10px;margin-bottom:15px;">
                <input type="text" id="produtoPromocao" placeholder="Produto" style="flex:1;padding:8px;border-radius:8px;border:1px solid #ccc;">
                <input type="number" id="precoPromocao" step="0.01" placeholder="Preço" style="width:100px;padding:8px;border-radius:8px;border:1px solid #ccc;">
                <button onclick="salvarPromocaoModal()" style="background:#2563eb;color:white;border:none;padding:8px 12px;border-radius:8px;">Salvar</button>
            </div>
            <div id="listaPromocoesModal"></div>
            <button onclick="adicionarNovoMercadoModal()" style="width:100%;padding:10px;background:#64748b;color:white;border:none;border-radius:8px;margin-top:10px;">+ Novo Mercado</button>
        </div>
    `;
    document.body.appendChild(modal);
    atualizarListaModal();
    document.getElementById("selectMercadoModal").onchange = () => atualizarListaModal();
}

function atualizarListaModal() {
    const mercado = document.getElementById("selectMercadoModal").value;
    const promocoes = promocoesPorMercado[mercado] || {};
    const container = document.getElementById("listaPromocoesModal");
    if (!container) return;
    
    container.innerHTML = "";
    for (let [produto, dados] of Object.entries(promocoes)) {
        container.innerHTML += `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px solid #eee;">
                <div><strong>${produto}</strong><br><small>R$ ${dados.preco.toFixed(2)}</small></div>
                <div>
                    <button onclick="editarPromocaoModal('${produto}')" style="background:none;color:#2563eb;border:none;cursor:pointer;">✏️</button>
                    <button onclick="excluirPromocaoModal('${produto}')" style="background:none;color:#dc2626;border:none;cursor:pointer;">🗑️</button>
                </div>
            </div>
        `;
    }
}

function salvarPromocaoModal() {
    const mercado = document.getElementById("selectMercadoModal").value;
    const produto = document.getElementById("produtoPromocao").value.trim().toLowerCase();
    const preco = parseFloat(document.getElementById("precoPromocao").value);
    
    if (!produto || isNaN(preco)) {
        alert("Preencha produto e preço!");
        return;
    }
    
    if (!promocoesPorMercado[mercado]) promocoesPorMercado[mercado] = {};
    promocoesPorMercado[mercado][produto] = { preco: preco, detalhe: "Oferta manual", ultimaAtualizacao: new Date().toISOString() };
    salvarPromocoes();
    
    document.getElementById("produtoPromocao").value = "";
    document.getElementById("precoPromocao").value = "";
    atualizarListaModal();
    carregar();
    alert("Oferta salva!");
}

function editarPromocaoModal(produto) {
    const mercado = document.getElementById("selectMercadoModal").value;
    const dados = promocoesPorMercado[mercado][produto];
    if (dados) {
        document.getElementById("produtoPromocao").value = produto;
        document.getElementById("precoPromocao").value = dados.preco;
    }
}

function excluirPromocaoModal(produto) {
    const mercado = document.getElementById("selectMercadoModal").value;
    if (confirm(`Remover ${produto}?`)) {
        delete promocoesPorMercado[mercado][produto];
        salvarPromocoes();
        atualizarListaModal();
        carregar();
    }
}

function adicionarNovoMercadoModal() {
    const nome = prompt("Nome do novo mercado:");
    if (nome && nome.trim()) {
        promocoesPorMercado[nome.trim()] = {};
        salvarPromocoes();
        const select = document.getElementById("selectMercadoModal");
        select.innerHTML = Object.keys(promocoesPorMercado).map(m => `<option value="${m}">${m}</option>`).join('');
        atualizarListaModal();
    }
}

function adicionarNovoMercado() {
    const nome = prompt("Nome do novo mercado:");
    if (nome && nome.trim()) {
        promocoesPorMercado[nome.trim()] = {};
        salvarPromocoes();
        alert(`Mercado ${nome} adicionado!`);
        carregar();
    }
}

// ========== EXIBIR PROMOÇÕES NA LISTA ==========
function obterTagsPromocao(produto, idItem = null) {
    let html = '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;">';
    const produtoKey = produto.toLowerCase();
    
    for (let [mercado, promocoes] of Object.entries(promocoesPorMercado)) {
        if (promocoes[produtoKey]) {
            const preco = promocoes[produtoKey].preco;
            html += `<button class="tag-promocao" style="background:#16a34a;" onclick="aplicarPrecoPromocao(${idItem !== null ? idItem : 'null'}, '${produto.replace(/'/g, "\\'")}', ${preco}, '${mercado}')">
                        🏷️ ${mercado}: R$ ${preco.toFixed(2)}
                    </button>`;
        }
    }
    
    html += '</div>';
    return html;
}

function aplicarPrecoPromocao(id, produto, preco, mercado) {
    if (id !== null && id !== 'null') {
        const idx = compras.findIndex(x => x.id == id);
        if (idx !== -1) {
            compras[idx].valor = preco;
            compras[idx].mercado = mercado;
            salvar();
            setTimeout(() => {
                const d = document.getElementById(`detalhes-${id}`);
                if(d) d.classList.add("ativo");
            }, 100);
        }
    } else {
        compras.push({
            id: Date.now() + Math.random(),
            produto: produto,
            quantidade: 1,
            valor: preco,
            mercado: mercado,
            data: new Date().toISOString().split('T')[0],
            comprado: false,
            noCarrinho: true,
            arquivado: false
        });
        salvar();
        alert(`"${produto}" adicionado por R$ ${preco.toFixed(2)} no ${mercado}!`);
    }
}

// ========== FUNÇÕES PRINCIPAIS ==========
function alternarScanner() {
    const btn = document.getElementById("btnIniciarCamera");
    if (html5QrcodeScanner && html5QrcodeScanner.isScanning) {
        html5QrcodeScanner.stop().then(() => {
            btn.innerText = "📷 Escanear QR Code da Nota Gaúcha";
        });
        return;
    }
    btn.innerText = "🛑 Desligar Câmera";
    if (!html5QrcodeScanner) { html5QrcodeScanner = new Html5Qrcode("reader"); }
    html5QrcodeScanner.start(
        { facingMode: "environment" }, 
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (qrCodeMessage) => {
            html5QrcodeScanner.stop().then(() => {
                btn.innerText = "📷 Escanear QR Code da Nota Gaúcha";
                window.open(qrCodeMessage, '_blank');
            });
        }
    ).catch(err => alert("Erro na câmera."));
}

function buscarPrecoExterno(nomeProduto) {
    window.open(`https://www.google.com/search?tbm=shop&q=${encodeURIComponent(nomeProduto)}`, '_blank');
}

function renderizarFavoritos() {
    const divFavs = document.getElementById("listaFavoritos");
    if (!divFavs) return;
    divFavs.innerHTML = "";
    
    let contagem = {};
    compras.filter(x => x.comprado).forEach(x => {
        contagem[x.produto] = (contagem[x.produto] || 0) + 1;
    });
    
    let ordenados = Object.keys(contagem).sort((a,b) => contagem[b] - contagem[a]).slice(0, 8);
    
    if (ordenados.length === 0) {
        document.getElementById("secaoSugestoes").style.display = "none";
        return;
    }
    if (abaAtual === "gabarito") document.getElementById("secaoSugestoes").style.display = "block";
    
    for (let prod of ordenados) {
        const jaAdicionado = compras.some(x => x.produto === prod && x.noCarrinho && !x.arquivado);
        if (!jaAdicionado) {
            divFavs.innerHTML += `<div class="badge-item" onclick="adicionarAoCarrinho('${prod.replace(/'/g, "\\'")}')">➕ ${prod}</div>`;
        }
    }
}

function carregar() {
    const busca = document.getElementById("busca").value.toLowerCase();
    let pendentes = 0, comprados = 0, totalGeralItens = 0;

    compras.forEach(item => {
        if (!item.arquivado && item.noCarrinho) {
            totalGeralItens++;
            if (item.comprado) comprados++; else pendentes++;
        }
    });

    document.getElementById("qtdItens").innerText = pendentes;
    document.getElementById("qtdComprados").innerText = comprados;
    document.getElementById("qtdTotalGeral").innerText = totalGeralItens;

    const paginaGabarito = document.getElementById("paginaGabarito");
    const paginaCarrinho = document.getElementById("paginaCarrinho");

    if (abaAtual === "gabarito") {
        paginaGabarito.innerHTML = "";
        let produtosFiltrados = [...new Set(gabaritoCustomizado)].sort();
        let categoriesAtivas = {};
        
        produtosFiltrados.forEach(prod => {
            if (busca && !prod.toLowerCase().includes(busca)) return;
            let cat = obterCategoria(prod);
            if(!categoriesAtivas[cat]) categoriesAtivas[cat] = [];
            categoriesAtivas[cat].push(prod);
        });

        for (let cat of Object.keys(categoriesAtivas).sort()) {
            paginaGabarito.innerHTML += `<div class="titulo-categoria">${cat}</div>`;
            for (let prod of categoriesAtivas[cat]) {
                const jaAdicionado = compras.some(x => x.produto === prod && x.noCarrinho && !x.arquivado);
                const tags = obterTagsPromocao(prod, null);
                
                paginaGabarito.innerHTML += `
                <div class="item-card">
                    <div>
                        <h3>${prod}</h3>
                        ${tags}
                    </div>
                    <button class="btnAdicionar ${jaAdicionado ? 'ja-adicionado' : ''}" 
                            onclick="${jaAdicionado ? '' : `adicionarAoCarrinho('${prod.replace(/'/g, "\\'")}')`}">
                        ${jaAdicionado ? '✔ Na Lista' : '➕ Adicionar'}
                    </button>
                </div>`;
            }
        }
    }

    if (abaAtual === "carrinho") {
        document.getElementById("secaoSugestoes").style.display = "none";
        paginaCarrinho.innerHTML = "";
        let itensAtivos = compras.filter(x => x.noCarrinho && !x.arquivado);

        if(itensAtivos.length === 0) {
            paginaCarrinho.innerHTML = `<p style="text-align:center; color:var(--cinza); padding:30px;">Sua lista está vazia.</p>`;
        }

        let categoriesCarrinho = {};
        itensAtivos.forEach(item => {
            if (busca && !item.produto.toLowerCase().includes(busca)) return;
            let cat = obterCategoria(item.produto);
            if(!categoriesCarrinho[cat]) categoriesCarrinho[cat] = [];
            categoriesCarrinho[cat].push(item);
        });

        for (let cat of Object.keys(categoriesCarrinho).sort()) {
            paginaCarrinho.innerHTML += `<div class="titulo-categoria">${cat}</div>`;
            for (let item of categoriesCarrinho[cat]) {
                const indexReal = compras.findIndex(x => x.id === item.id);
                const tags = obterTagsPromocao(item.produto, item.id);
                
                paginaCarrinho.innerHTML += `
                <div class="item-card ${item.comprado ? 'comprado' : ''}">
                    <div class="flex-col">
                        <div class="topo-card">
                            <div>
                                <h3 onclick="toggleDetalhesCard(${item.id})">${item.produto}</h3>
                                ${tags}
                            </div>
                            <div style="display:flex; gap:10px; align-items:center;">
                                <button class="btnToggleDetalhes" onclick="toggleDetalhesCard(${item.id})">⚙ Config</button>
                                <button class="btnRemover" onclick="removerDoCarrinho(${indexReal})">✕</button>
                            </div>
                        </div>
                        
                        <div id="detalhes-${item.id}" class="detalhes-produto">
                            <div>
                                <button class="btnBuscarNfg" onclick="buscarPrecoExterno('${item.produto.replace(/'/g, "\\'")}')">
                                    🔍 Pesquisar Ofertas
                                </button>
                            </div>
                            
                            <div class="linha-inputs">
                                <div class="campo">
                                    <label>Status</label>
                                    <select id="statusSelect-${item.id}" onchange="alterarStatus(${indexReal}, this.value, ${item.id})">
                                        <option value="false" ${!item.comprado ? 'selected' : ''}>⚠ Falta</option>
                                        <option value="true" ${item.comprado ? 'selected' : ''}>✔ Comprado</option>
                                    </select>
                                </div>
                                <div class="campo">
                                    <label>Qtd</label>
                                    <input type="number" style="width:50px;" min="1" value="${item.quantidade || 1}" onchange="alterarQuantidade(${indexReal}, this.value)">
                                </div>
                                <div class="campo">
                                    <label>Preço</label>
                                    <input type="number" style="width:70px;" step="0.01" value="${item.valor || ''}" onchange="alterarValor(${indexReal}, this.value)">
                                </div>
                                <div class="campo">
                                    <label>Mercado</label>
                                    <input type="text" style="width:100px;" value="${item.mercado || ''}" onchange="alterarMercado(${indexReal}, this.value)">
                                </div>
                                <div class="campo">
                                    <label>Data</label>
                                    <input type="date" style="width:110px;" value="${item.data || ''}" onchange="alterarData(${indexReal}, this.value)">
                                </div>
                                <div class="campo">
                                    <label>Total</label>
                                    <div class="valor-total">R$ ${((item.valor || 0) * (item.quantidade || 1)).toFixed(2)}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            }
        }
    }

    renderizarFavoritos();
    carregarFiltroProdutosGrafico();
}

function toggleDetalhesCard(id) {
    const elem = document.getElementById(`detalhes-${id}`);
    if(elem) elem.classList.toggle("ativo");
}

function cadastrarNovoProdutoGeral() {
    const inputBusca = document.getElementById("busca");
    const nomeNovo = inputBusca.value.trim();
    if (!nomeNovo) return;
    if (!gabaritoCustomizado.some(x => x.toLowerCase() === nomeNovo.toLowerCase())) {
        gabaritoCustomizado.push(nomeNovo);
        localStorage.setItem("gabarito_custom", JSON.stringify(gabaritoCustomizado));
    }
    adicionarAoCarrinho(nomeNovo);
    inputBusca.value = "";
    carregar();
}

function adicionarAoCarrinho(nomeProduto) {
    compras.push({
        id: Date.now() + Math.random(),
        produto: nomeProduto,
        quantidade: 1,
        valor: 0,
        mercado: "",
        data: new Date().toISOString().split('T')[0],
        comprado: false,
        noCarrinho: true,
        arquivado: false
    });
    salvar();
}

function removerDoCarrinho(index) {
    if(compras[index].valor === 0) compras.splice(index, 1); 
    else compras[index].noCarrinho = false;
    salvar();
}

function mudarAba(aba) {
    abaAtual = aba;
    document.getElementById("btnAbaGabarito").classList.remove("ativo");
    document.getElementById("btnAbaCarrinho").classList.remove("ativo");
    document.getElementById("btnAbaHistorico").classList.remove("ativo");
    document.getElementById("btnVirarMes").classList.add("oculto");
    document.getElementById("secaoScanner").classList.add("oculto");
    document.getElementById("paginaGabarito").classList.add("oculto");
    document.getElementById("paginaCarrinho").classList.add("oculto");
    document.getElementById("paginaHistorico").classList.add("oculto");

    if (html5QrcodeScanner && html5QrcodeScanner.isScanning) {
        html5QrcodeScanner.stop();
    }

    if (aba === "gabarito") {
        document.getElementById("btnAbaGabarito").classList.add("ativo");
        document.getElementById("paginaGabarito").classList.remove("oculto");
    } else if (aba === "carrinho") {
        document.getElementById("btnAbaCarrinho").classList.add("ativo");
        document.getElementById("paginaCarrinho").classList.remove("oculto");
        document.getElementById("btnVirarMes").classList.remove("oculto");
        document.getElementById("secaoScanner").classList.remove("oculto");
    } else if (aba === "historico") {
        document.getElementById("btnAbaHistorico").classList.add("ativo");
        document.getElementById("paginaHistorico").classList.remove("oculto");
        atualizarGrafico();
    }
    carregar();
}

function alterarStatus(index, val, idElemento) { 
    if (val === "true" && (!compras[index].valor || compras[index].valor <= 0)) {
        alert(`Digite o preço antes de marcar como comprado.`);
        const select = document.getElementById(`statusSelect-${idElemento}`);
        if(select) select.value = "false";
        return;
    }
    compras[index].comprado = (val === "true"); 
    salvar(); 
}

function alterarQuantidade(index, val) { compras[index].quantidade = Number(val) || 1; salvar(); }
function alterarValor(index, val) { compras[index].valor = Number(val) || 0; salvar(); }
function alterarData(index, val) { compras[index].data = val; salvar(); }
function alterarMercado(index, val) { compras[index].mercado = val; salvar(); }

function salvar() {
    localStorage.setItem("compras_v3", JSON.stringify(compras));
    carregar();
}

function carregarFiltroProdutosGrafico(){
    let produtosComPreco = [...new Set(compras.filter(x => x.valor > 0).map(x => x.produto))].sort();
    let produtoHistorico = document.getElementById("produtoHistorico");
    let anterior = produtoHistorico.value;
    produtoHistorico.innerHTML = "";
    if(produtosComPreco.length === 0) {
        produtoHistorico.innerHTML = "<option>Nenhum histórico</option>";
        return;
    }
    produtosComPreco.forEach(prod => { produtoHistorico.innerHTML += `<option value="${prod}">${prod}</option>`; });
    if(anterior && produtosComPreco.includes(anterior)) produtoHistorico.value = anterior;
}

document.getElementById("produtoHistorico")?.addEventListener("change", atualizarGrafico);

function atualizarGrafico(){
    let prod = document.getElementById("produtoHistorico").value;
    let dados = compras.filter(x => x.produto === prod && x.valor > 0 && x.data).sort((a,b) => new Date(a.data) - new Date(b.data));
    if(dados.length === 0) {
        if(grafico) grafico.destroy();
        document.getElementById("menorPreco").innerText = "R$ 0,00";
        document.getElementById("maiorPreco").innerText = "R$ 0,00";
        document.getElementById("ultimoPreco").innerText = "R$ 0,00";
        return;
    }
    let labels = dados.map(x => {
        let p = x.data.split('-');
        return x.mercado ? `${p[2]}/${p[1]} (${x.mercado})` : `${p[2]}/${p[1]}`;
    });
    let valores = dados.map(x => x.valor);
    if(grafico) grafico.destroy();
    grafico = new Chart(document.getElementById("grafico"), {
        type: 'line',
        data: { labels, datasets: [{ label: 'Preço', data: valores, borderColor: '#2563eb', fill: false }] }
    });
    
    let menorItem = [...dados].sort((a,b) => a.valor - b.valor)[0];
    let maiorItem = [...dados].sort((a,b) => b.valor - a.valor)[0];
    let ultimoItem = dados[dados.length - 1];
    document.getElementById("menorPreco").innerText = `R$ ${menorItem.valor.toFixed(2)} (${menorItem.mercado || '?'})`;
    document.getElementById("maiorPreco").innerText = `R$ ${maiorItem.valor.toFixed(2)} (${maiorItem.mercado || '?'})`;
    document.getElementById("ultimoPreco").innerText = `R$ ${ultimoItem.valor.toFixed(2)} (${ultimoItem.mercado || '?'})`;
}

function novoMes(){
    if(!confirm("Fechar o mês? Itens comprados vão para o histórico.")) return;
    compras.forEach(item => {
        if(item.noCarrinho && !item.arquivado) {
            if(item.comprado && item.valor > 0) item.arquivado = true; 
            else item.noCarrinho = false;
        }
    });
    salvar();
}

function exportarDados() {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({ 
        gabarito: gabaritoCustomizado, 
        compras: compras, 
        promocoes: promocoesPorMercado 
    }));
    const dl = document.createElement('a');
    dl.setAttribute("href", dataStr);
    dl.setAttribute("download", `backup_${new Date().toISOString().split('T')[0]}.json`);
    dl.click();
}

function importarDados() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.readAsText(file,'UTF-8');
        reader.onload = re => {
            let d = JSON.parse(re.target.result);
            if(d.compras) compras = d.compras;
            if(d.gabarito) gabaritoCustomizado = d.gabarito;
            if(d.promocoes) promocoesPorMercado = d.promocoes;
            salvarPromocoes();
            salvar();
            alert("Backup importado!");
            location.reload();
        }
    };
    input.click();
}

// Inicializar
carregar();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Compras Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --azul:#2563eb; --verde:#16a34a; --vermelho:#dc2626; --amarelo:#facc15; --cinza:#64748b; --fundo:#f8fafc; --card:#ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--fundo); margin: 0; padding-bottom: 80px; }
        header { background: var(--azul); color: white; padding: 15px; text-align: center; }
        .container { max-width: 600px; margin: auto; padding: 10px; }
        .item-card { background: var(--card); padding: 12px; margin-bottom: 10px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-tag { border: none; padding: 4px 8px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 11px; margin-top: 5px; }
        .miller { background: var(--azul); color: white; }
        .desco { background: var(--vermelho); color: var(--amarelo); border: 1px solid var(--amarelo); }
        .btn-add { background: #dcfce7; color: var(--verde); border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<header><h1>🛒 Lista de Compras</h1></header>

<div class="container" id="listaProdutos">
    </div>

<script>
    // Banco de Dados das Promoções
    const promos = {
        "amaciante": { preco: 19.47, mercado: "Desco", classe: "desco" },
        "lava roupas": { preco: 27.12, mercado: "Desco", classe: "desco" },
        "trakinas": { preco: 2.69, mercado: "Desco", classe: "desco" },
        "oreo": { preco: 3.49, mercado: "Desco", classe: "desco" },
        "club social": { preco: 4.79, mercado: "Desco", classe: "desco" },
        "creme de avelã": { preco: 15.90, mercado: "Miller", classe: "miller" }
    };

    const listaProdutos = ["Amaciante", "Lava Roupas", "Trakinas", "Oreo", "Club Social", "Creme de Avelã"];

    function renderizar() {
        const container = document.getElementById('listaProdutos');
        container.innerHTML = "";
        
        listaProdutos.forEach(prod => {
            const chave = Object.keys(promos).find(k => prod.toLowerCase().includes(k));
            const itemPromo = promos[chave];
            
            const div = document.createElement('div');
            div.className = 'item-card';
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <strong style="font-size: 15px;">${prod}</strong><br>
                        ${itemPromo ? `<button class="btn-tag ${itemPromo.classe}" onclick="alert('Aplicado: ${itemPromo.mercado} - R$ ${itemPromo.preco.toFixed(2)}')">
                            🔥 ${itemPromo.mercado}: R$ ${itemPromo.preco.toFixed(2)}
                        </button>` : '<span style="font-size:11px; color:var(--cinza)">Sem promo</span>'}
                    </div>
                    <button class="btn-add" onclick="alert('Adicionado à lista!')">➕</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    renderizar();
</script>
</body>
</html>
